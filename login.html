<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuários</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --warning: #e74c3c; --bg: #ffffff; --light: #ecf0f1; --border: #bdc3c7; --text: #2c3e50; }
        .dark { --primary: #ecf0f1; --accent: #3498db; --success: #2ecc71; --warning: #e74c3c; --bg: #1a1a1a; --light: #2d2d2d; --border: #404040; --text: #ecf0f1; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; padding: 20px; }
        
        .container { max-width: 600px; margin: 0 auto; animation: slideInUp 0.4s ease-out; }
        
        h2 { font-size: 28px; margin-bottom: 20px; color: var(--primary); animation: slideInTopFast 0.4s ease-out; }
        h3 { font-size: 16px; margin: 20px 0 15px; color: var(--accent); border-bottom: 2px solid rgba(52, 152, 219, 0.2); padding-bottom: 8px; animation: slideInLeft 0.4s ease-out; }
        
        .theme-toggle { position: fixed; top: 15px; right: 15px; font-size: 18px; cursor: pointer; background: var(--light); border: 1px solid var(--border); border-radius: 4px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; animation: slideInRight 0.4s ease-out; z-index: 100; }
        .theme-toggle:hover { background: var(--accent); color: white; transform: scale(1.1); }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; animation: slideInUp 0.5s ease-out; }
        .form-row { display: flex; flex-direction: column; gap: 6px; }
        .form-row label { font-size: 13px; font-weight: 600; color: var(--primary); }
        
        input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit; transition: all 0.3s ease; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15); }
        input::placeholder { color: rgba(44, 62, 80, 0.5); }
        
        .info-box { background: var(--light); padding: 12px 14px; border-radius: 4px; border-left: 3px solid var(--accent); margin: 15px 0; font-size: 13px; animation: slideInLeft 0.4s ease-out; }
        
        .btn-container { display: flex; gap: 10px; margin-top: 25px; animation: slideInUp 0.6s ease-out; }
        .btn { padding: 12px 24px; border: none; border-radius: 4px; background: var(--accent); color: white; cursor: pointer; font-weight: 600; transition: all 0.3s ease; position: relative; overflow: hidden; flex: 1; font-size: 14px; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(52, 152, 219, 0.3); }
        .btn:active { transform: translateY(0); }
        .btn-success { background: var(--success); }
        .btn-success:hover { box-shadow: 0 6px 12px rgba(39, 174, 96, 0.3); }
        .btn-secondary { background: var(--border); color: var(--primary); }
        .btn-secondary:hover { background: var(--light); box-shadow: 0 6px 12px rgba(189, 195, 199, 0.3); }
        
        .section { background: var(--light); padding: 18px; border-radius: 6px; margin-bottom: 18px; border: 1px solid rgba(52, 152, 219, 0.1); animation: slideInDown 0.35s ease-out; }

        .message-box { padding: 12px 14px; border-radius: 4px; margin-bottom: 20px; font-size: 13px; display: none; }
        .message-box.error { background: rgba(231, 76, 60, 0.15); color: #c0392b; border: 1px solid rgba(231, 76, 60, 0.3); border-left: 3px solid #e74c3c; }
        .message-box.success { background: rgba(39, 174, 96, 0.15); color: #27ae60; border: 1px solid rgba(39, 174, 96, 0.3); border-left: 3px solid #27ae60; }
        .message-box.show { display: block; }
        
        .loading { display: none; text-align: center; margin-top: 15px; }
        .spinner { border: 2px solid rgba(52, 152, 219, 0.2); border-top: 2px solid var(--accent); border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; margin: 0 auto; }
        
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInTopFast { 0% { opacity: 0; transform: translateY(-15px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">🌙</div>
    
    <div class="container">
        <h2> Cadastrar Nova Pessoa</h2>
        
        <div class="info-box">
            ℹ️ Preencha todos os campos abaixo para realizar o cadastro
        </div>
        
        <div id="messageBox" class="message-box"></div>

        <!-- O formulário envia os dados direto para o nosso servidor Node.js -->
        <form id="registerForm">
            <div class="section">
                <h3> Dados Pessoais</h3>
                <div class="form-grid">
                    <div class="form-row">
                        <label for="nome">Nome Completo:</label>
                        <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>
                    </div>
                    <div class="form-row">
                        <label for="cpf">CPF (Apenas números):</label>
                        <input type="text" id="cpf" name="cpf" maxlength="11" placeholder="00000000000" required>
                    </div>
                    <div class="form-row">
                        <label for="data_nascimento">Data de Nascimento:</label>
                        <input type="date" id="data_nascimento" name="data_nascimento" required>
                    </div>
                    <div class="form-row">
                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" name="senha" placeholder="Digite uma senha segura" required>
                    </div>
                </div>
            </div>

            <div class="section">
                <h3> Endereço</h3>
                <div class="form-grid">
                    <div class="form-row">
                        <label for="rua">Rua:</label>
                        <input type="text" id="rua" name="rua" placeholder="Ex: Rua das Flores" required>
                    </div>
                    <div class="form-row">
                        <label for="cidade">Cidade:</label>
                        <input type="text" id="cidade" name="cidade" placeholder="Ex: São Paulo" required>
                    </div>
                    <div class="form-row">
                        <label for="estado">Estado (Sigla):</label>
                        <input type="text" id="estado" name="estado" maxlength="2" placeholder="Ex: SP" required>
                    </div>
                </div>
            </div>

            <div class="btn-container">
                <button type="submit" class="btn btn-success">✓ Salvar Cadastro</button>
                <button type="reset" class="btn btn-secondary">↻ Limpar</button>
            </div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>
        </form>
        
        <div class="info-box" style="margin-top: 20px; background: rgba(52, 152, 219, 0.1); border-left-color: var(--accent);">
            ℹ️ <strong>Dica:</strong> Defina uma senha que você possa lembrar para acessar o sistema.
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.classList.contains('dark');
            html.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            updateThemeToggle();
        }

        function updateThemeToggle() {
            const html = document.documentElement;
            const toggle = document.querySelector('.theme-toggle');
            toggle.textContent = html.classList.contains('dark') ? '☀️' : '🌙';
        }

        // Aplicar tema salvo ao carregar
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark');
        }
        updateThemeToggle();

        function showMessage(text, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = text;
            messageBox.className = `message-box ${type} show`;
        }

        const form = document.getElementById('registerForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = form.querySelector('button[type="submit"]');
            const loading = document.getElementById('loading');
            const nome = document.getElementById('nome').value.trim();
            const cpf = document.getElementById('cpf').value.trim();
            const data_nascimento = document.getElementById('data_nascimento').value;
            const senha = document.getElementById('senha').value;
            const rua = document.getElementById('rua').value.trim();
            const cidade = document.getElementById('cidade').value.trim();
            const estado = document.getElementById('estado').value.trim();

            if (!nome || !cpf || !data_nascimento || !senha || !rua || !cidade || !estado) {
                showMessage('❌ Preencha todos os campos!', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Cadastrando...';

            try {
                const response = await fetch('http://localhost:3000/cadastrar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ nome, cpf, data_nascimento, senha, rua, cidade, estado }),
                });

                const data = await response.json();

                if (response.ok && data.sucesso) {
                    showMessage('✓ Cadastro realizado! Voltando para a tela de início...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showMessage('❌ ' + (data.mensagem || 'Erro ao cadastrar usuário.'), 'error');
                }
            } catch (error) {
                showMessage('❌ Erro ao conectar com o servidor.', 'error');
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '✓ Salvar Cadastro';
            }
        });
    </script>
</body>
</html>
